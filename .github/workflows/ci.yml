name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test, lint, and build (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev tools
        run: python -m pip install --upgrade pip && python -m pip install -e ".[cirq,plot,yaml,tket,dev]"

      - name: Check formatting
        run: black --check quantum_backend_bench tests examples

      - name: Lint
        run: ruff check quantum_backend_bench tests examples

      - name: Run tests
        run: pytest

      - name: Check package documentation manifest
        run: pytest tests/test_packaging.py -k required_docs

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

  optional-backends:
    name: Optional backend smoke (${{ matrix.extra }})
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - extra: pennylane
            filter: pennylane
          - extra: braket
            filter: braket
          - extra: qiskit
            filter: qiskit
          - extra: cudaq
            filter: cudaq
            experimental: true
          - extra: pyquil
            filter: pyquil
          - extra: qutip
            filter: qutip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install optional backend
        run: python -m pip install --upgrade pip && python -m pip install -e ".[${{ matrix.extra }},dev]"

      - name: Run backend smoke tests
        run: pytest tests/test_backends.py -k "${{ matrix.filter }}"
